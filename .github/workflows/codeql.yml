name: CodeQL

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  analyze:
    uses: Mininglamp-OSS/.github/.github/workflows/reusable-codeql.yml@v1
    with:
      language: go
    permissions:
      actions: read
      contents: read
      security-events: write
