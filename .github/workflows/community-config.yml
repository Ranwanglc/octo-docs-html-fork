name: Community Config

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/**'
  push:
    branches: [main]
    paths:
      - '.github/**'

permissions:
  contents: read

concurrency:
  group: community-config-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: Community configuration contract
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Validate community configuration
        run: bash .github/tests/community-config.sh
