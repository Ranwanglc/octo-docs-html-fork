name: Docker Lint

on:
  push:
    branches: [main]
    paths:
      - 'deploy/Dockerfile*'
      - '.hadolint.yaml'
      - '.github/workflows/docker-lint.yml'
  pull_request:
    branches: [main]
    paths:
      - 'deploy/Dockerfile*'
      - '.hadolint.yaml'
      - '.github/workflows/docker-lint.yml'

permissions: {}

jobs:
  docker-lint:
    uses: Mininglamp-OSS/.github/.github/workflows/reusable-docker-lint.yml@v1
    with:
      dockerfiles: 'deploy/Dockerfile'
      shell-dir: ''
    permissions:
      contents: read
